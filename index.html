<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Mapa de Vegetacao</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #333;
            --text: #e0e0e0;
            --text2: #888;
            --accent: #4CAF50;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 { font-size: 16px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }

        .header .tag {
            font-size: 10px; color: var(--text2); background: var(--surface2);
            padding: 4px 10px; border-radius: 4px; letter-spacing: 1px;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 32px; }

        .upload-zone {
            border: 2px dashed var(--border); border-radius: 12px;
            padding: 60px 40px; text-align: center; cursor: pointer;
            transition: all 0.2s; background: var(--surface);
        }
        .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: rgba(76,175,80,0.05); }
        .upload-zone .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
        .upload-zone p { color: var(--text2); font-size: 14px; margin-top: 8px; }
        .upload-zone .filename { color: var(--accent); font-weight: 600; font-size: 14px; margin-top: 12px; }
        .upload-zone input { display: none; }

        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 28px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.15s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-outline:hover { border-color: var(--text2); background: var(--surface2); }

        .actions { display: flex; gap: 12px; margin-top: 24px; justify-content: center; }

        .species-config { display: flex; gap: 24px; margin-top: 24px; justify-content: center; flex-wrap: wrap; }
        .species-chip {
            display: flex; align-items: center; gap: 8px;
            background: var(--surface); border: 1px solid var(--border);
            padding: 8px 16px; border-radius: 20px; font-size: 13px;
        }
        .species-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .species-chip .code { font-weight: 700; }
        .species-chip .name { color: var(--text2); font-style: italic; }

        .progress-bar {
            width: 100%; height: 3px; background: var(--surface2);
            border-radius: 2px; margin-top: 24px; overflow: hidden; display: none;
        }
        .progress-bar.active { display: block; }
        .progress-bar .fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }

        .status { text-align: center; font-size: 13px; color: var(--text2); margin-top: 12px; min-height: 20px; }

        .preview-section { display: none; margin-top: 32px; }
        .preview-section.active { display: block; }

        .preview-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .preview-header {
            padding: 16px 24px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .preview-header h2 { font-size: 14px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        .preview-stats { display: flex; gap: 20px; }
        .preview-stats .stat { font-size: 12px; color: var(--text2); }
        .preview-stats .stat strong { color: var(--text); font-size: 18px; display: block; }

        .map-wrap { position: relative; background: white; }
        .map-wrap canvas { display: block; width: 100%; height: auto; }
        .map-wrap svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .legend-bar {
            display: flex; justify-content: center; gap: 40px;
            padding: 16px 24px; border-top: 1px solid var(--border); flex-wrap: wrap;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; }
        .legend-circle { width: 18px; height: 18px; border-radius: 50%; }
        .legend-label .lcode { font-weight: 700; font-size: 13px; }
        .legend-label .lname { font-style: italic; font-size: 12px; color: var(--text2); }
        .legend-label .lcount { font-size: 11px; color: var(--text2); }

        .download-section { display: none; margin-top: 24px; }
        .download-section.active { display: block; }
        .download-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .download-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
            padding: 20px; text-align: center; cursor: pointer; transition: all 0.15s;
        }
        .download-card:hover { border-color: var(--accent); background: var(--surface2); }
        .download-card .format { font-size: 22px; font-weight: 700; letter-spacing: 2px; margin-bottom: 6px; }
        .download-card .desc { font-size: 11px; color: var(--text2); }

        .new-upload { text-align: center; margin-top: 20px; }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .upload-zone { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Mapa de Vegetacao</h1>
        <span class="tag">Paisagismo Tecnico</span>
    </div>
    <div class="container">
        <div id="uploadSection">
            <div class="upload-zone" id="dropZone">
                <div class="icon">&#128196;</div>
                <div><strong>Arraste o PDF de paisagismo aqui</strong></div>
                <p>ou clique para selecionar o arquivo</p>
                <div class="filename" id="fileName"></div>
                <input type="file" id="fileInput" accept=".pdf">
            </div>
            <div class="species-config" id="speciesConfig"></div>
            <div class="actions"><button class="btn btn-primary" id="processBtn" disabled>Processar PDF</button></div>
            <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
            <div class="status" id="statusText"></div>
        </div>

        <div class="preview-section" id="previewSection">
            <div class="preview-card">
                <div class="preview-header">
                    <h2>Implantacao de Vegetacao</h2>
                    <div class="preview-stats">
                        <div class="stat"><strong id="totalTrees">0</strong>arvores</div>
                        <div class="stat"><strong id="totalSpecies">0</strong>especies</div>
                    </div>
                </div>
                <div class="map-wrap"><canvas id="mapCanvas"></canvas><svg id="mapSvg" xmlns="http://www.w3.org/2000/svg"></svg></div>
                <div class="legend-bar" id="legendBar"></div>
            </div>
        </div>

        <div class="download-section" id="downloadSection">
            <div class="download-grid">
                <div class="download-card" onclick="exportPNG()"><div class="format">PNG</div><div class="desc">Imagem em alta resolucao</div></div>
                <div class="download-card" onclick="exportPDF()"><div class="format">PDF</div><div class="desc">Documento para impressao</div></div>
            </div>
            <div class="new-upload"><button class="btn btn-outline" onclick="resetApp()">Processar outro PDF</button></div>
        </div>
    </div>

'PALM','PALU','PAPE','PARA','PARI','PASP','PATO','PATR','PAUT','PAWE','PEAL','PEAN','PEAR',
'PEBL','PEDU','PEFU','PEGR','PESE','PESU','PEVO','PHAU','PHBI','PHCA','PHCN','PHCO','PHDA',
'PHDN','PHED','PHER','PHET','PHFR','PHMA','PHME','PHNI','PHRN','PHRO','PHRU','PHSA','PHSC',
'PHSO','PHSP','PHSU','PHTE','PHUN','PIAZ','PICR','PIDI','PIGO','PIKU','PIPS','PIRI','PIST',

'PLSP','POCA','POCC','POCO','POCR','POFR','POGU','POLA','POMA','PONI','POPA','PRCA','PRCE',
'PRPA','PRPE','PRSA','PRSE','PRWI','PSAT','PSCA','PSGR','PSGU','PSMY','PTBR','PTEL','PTEM',
'PTMA','PTNI','PTVI','PUGR','PYCM','PYCO','PYVE','RAFE','RAFO','RAGU','RAMA','RHAR','RHCA',

'SPCY','SPGI','SPLU','SPOR','SPPU','SPTU','STAD','STAU','STCA','STCH','STCR','STFL','STJU',
'STMA','STPA','STRE','STSI','STSP','STST','SWFR','SWLA','SWMA','SYAR','SYBO','SYCO','SYCR',
'SYCU','SYIN','SYMA','SYMC','SYOL','SYPS','SYRO','SYRU','SYSC','SYVU','TAAU','TAAV','TACA',
'TACH','TADI','TAES','TAGU','TAHE','TAIM','TAIN','TALA','TAOC','TAOV','TAPE','TARO','TASE',
'TAUM','TAVE','TECA','TEPA','TEST','TETR','TEVO','THAN','THAU','THCO','THER','THGL','THGR',
'THMY','THPE','THPL','THPO','TIGA','TIGR','TIHO','TIMN','TIMO','TIMU','TIRA','TISP','TITI',
'TOBU','TRBA','TRBR','TRFO','TRJA','TRMI','TRPA','TYLI','VAFR','VEME','VIAM','VIME','VIMO',
'VIOL','VISP','VOTU','VRHI','VRIM','VRIN','VRSP','VTSP','WAFI','WARO','WICH','WIFL','WOBI',
'XASP','XYBR','YUEL','YUFI','YUGL','ZAFU','ZARH','ZARI','ZAZA',
]);

let pdfFile = null, treeData = {}, speciesColors = {}, pageW = 0, pageH = 0;

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const $ = id => document.getElementById(id);
const dropZone = $('dropZone'), fileInput = $('fileInput'), fileNameEl = $('fileName');
const processBtn = $('processBtn'), progressBar = $('progressBar'), progressFill = $('progressFill');
const statusText = $('statusText'), uploadSection = $('uploadSection');
const previewSection = $('previewSection'), downloadSection = $('downloadSection');
const mapCanvas = $('mapCanvas'), mapSvg = $('mapSvg'), legendBar = $('legendBar');
const speciesConfig = $('speciesConfig');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });
processBtn.addEventListener('click', processPDF);

function handleFile(f) {
    if (f.type !== 'application/pdf') { statusText.textContent = 'Selecione um arquivo PDF.'; return; }
    pdfFile = f; fileNameEl.textContent = f.name; processBtn.disabled = false; statusText.textContent = '';
}

function setProgress(p) { progressBar.classList.add('active'); progressFill.style.width = p + '%'; }

function getColor(idx) { return COLOR_PALETTE[idx % COLOR_PALETTE.length]; }

async function processPDF() {
    if (!pdfFile) return;
    processBtn.disabled = true;
    setProgress(10); statusText.textContent = 'Carregando PDF...';
    try {
        const buf = await pdfFile.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        setProgress(30); statusText.textContent = 'Extraindo dados...';

        const page = await pdf.getPage(1);
        const vp = page.getViewport({ scale: 1.0 });
        pageW = vp.width; pageH = vp.height;

        setProgress(40); statusText.textContent = 'Localizando especies...';

        // Extrair texto e filtrar apenas siglas da tabela oficial
        const tc = await page.getTextContent();
        treeData = {};
        for (const item of tc.items) {
            const t = item.str.trim();
            if (!SPECIES_CODES.has(t)) continue;
            const [vx, vy] = vp.convertToViewportPoint(item.transform[4], item.transform[5]);
            if (!treeData[t]) treeData[t] = [];
            treeData[t].push({ x: vx, y: vy });
        }

        const legendCodes = Object.keys(treeData).sort();
        const total = Object.values(treeData).reduce((s, a) => s + a.length, 0);

        if (total === 0) {
            statusText.textContent = 'Nenhuma especie da tabela oficial encontrada no PDF.';
            processBtn.disabled = false; setProgress(0); progressBar.classList.remove('active'); return;
        }

        console.log('Especies encontradas:', legendCodes, '| Total:', total);

        // Atribuir cores
        speciesColors = {};
        legendCodes.forEach((code, i) => { speciesColors[code] = getColor(i); });

        // Mostrar chips das especies detectadas
        speciesConfig.innerHTML = '';
        for (const code of legendCodes) {
            const cnt = treeData[code].length;
            const chip = document.createElement('div'); chip.className = 'species-chip';
            chip.innerHTML = `<span class="species-dot" style="background:${speciesColors[code]}"></span><span class="code">${code}</span><span class="name">(${cnt})</span>`;
            speciesConfig.appendChild(chip);
        }

        setProgress(60); statusText.textContent = 'Renderizando planta...';
        const ctx = mapCanvas.getContext('2d');
        mapCanvas.width = vp.width; mapCanvas.height = vp.height;
        await page.render({ canvasContext: ctx, viewport: vp }).promise;

        // Grayscale + 20% opacity
        const imgData = ctx.getImageData(0, 0, mapCanvas.width, mapCanvas.height);
        const d = imgData.data;
        for (let i = 0; i < d.length; i += 4) {
            const g = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
            d[i] = d[i+1] = d[i+2] = Math.round(255 * 0.8 + g * 0.2);
        }
        ctx.putImageData(imgData, 0, 0);

        setProgress(80); statusText.textContent = 'Desenhando vegetacao...';
        const r = pageW * CIRCLE_R_RATIO;
        mapSvg.setAttribute('viewBox', `0 0 ${pageW} ${pageH}`);
        mapSvg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        mapSvg.innerHTML = '';
        for (const [code, pos] of Object.entries(treeData)) {
            for (const p of pos) {
                const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                c.setAttribute('cx', p.x); c.setAttribute('cy', p.y); c.setAttribute('r', r);
                c.setAttribute('fill', speciesColors[code]); c.setAttribute('fill-opacity', CIRCLE_OPACITY);
                c.setAttribute('stroke', 'white'); c.setAttribute('stroke-width', 2.5);
                mapSvg.appendChild(c);
            }
        }

        // Legend
        legendBar.innerHTML = '';
        for (const code of legendCodes) {
            const cnt = treeData[code].length;
            if (!cnt) continue;
            const el = document.createElement('div'); el.className = 'legend-item';
            el.innerHTML = `<span class="legend-circle" style="background:${speciesColors[code]}"></span><div class="legend-label"><span class="lcode">${code}</span> <span class="lcount">(${cnt} un.)</span></div>`;
            legendBar.appendChild(el);
        }

        $('totalTrees').textContent = total;
        $('totalSpecies').textContent = legendCodes.length;

        setProgress(100); statusText.textContent = '';
        setTimeout(() => {
            uploadSection.style.display = 'none';
            previewSection.classList.add('active');
            downloadSection.classList.add('active');
            progressBar.classList.remove('active');
        }, 300);
    } catch (err) {
        console.error(err);
        statusText.textContent = 'Erro: ' + err.message;
        processBtn.disabled = false; setProgress(0); progressBar.classList.remove('active');
    }
}

function hexToRgb(h) { h = h.replace('#',''); return { r: parseInt(h.substring(0,2),16), g: parseInt(h.substring(2,4),16), b: parseInt(h.substring(4,6),16) }; }

function renderComposite(scale) {
    const w = pageW * scale, h = pageH * scale, r = pageW * CIRCLE_R_RATIO * scale;
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.drawImage(mapCanvas, 0, 0, w, h);
    for (const [code, positions] of Object.entries(treeData)) {
        const rgb = hexToRgb(speciesColors[code]);
        ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2.5 * scale;
        for (const p of positions) {
            ctx.beginPath(); ctx.arc(p.x * scale, p.y * scale, r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${CIRCLE_OPACITY})`; ctx.fill(); ctx.stroke();
        }
    }
    return c;
}

function exportPNG() {
    const s = 2, mc = renderComposite(s);
    const hH = 80, lH = 50, tH = hH + mc.height + lH;
    const out = document.createElement('canvas'); out.width = mc.width; out.height = tH;
    const ctx = out.getContext('2d');
    ctx.fillStyle = 'white'; ctx.fillRect(0, 0, out.width, tH);
    ctx.fillStyle = '#222'; ctx.font = `bold ${24*s}px Helvetica,Arial,sans-serif`; ctx.textAlign = 'center';
    ctx.fillText('IMPLANTACAO DE VEGETACAO', out.width/2, 30*s);
    ctx.fillStyle = '#777'; ctx.font = `${11*s}px Helvetica,Arial,sans-serif`;
    ctx.fillText('Plano de Paisagismo - Mapa de Especies Arboreas', out.width/2, 48*s);
    ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(40*s, hH-2); ctx.lineTo(out.width-40*s, hH-2); ctx.stroke();
    ctx.drawImage(mc, 0, hH);
    const lY = hH + mc.height + 8;
    ctx.beginPath(); ctx.moveTo(40*s, lY-6); ctx.lineTo(out.width-40*s, lY-6); ctx.stroke();
    const entries = Object.entries(treeData).filter(([,v]) => v.length > 0);
    const segW = out.width / entries.length;
    entries.forEach(([code, pos], i) => {
        const cx = segW*i + segW/2;
        ctx.beginPath(); ctx.arc(cx-50*s, lY+12, 8*s, 0, Math.PI*2);
        ctx.fillStyle = speciesColors[code]; ctx.fill();
        ctx.fillStyle = '#333'; ctx.font = `bold ${10*s}px Helvetica,Arial,sans-serif`; ctx.textAlign = 'left';
        ctx.fillText(`${code} (${pos.length} un.)`, cx-36*s, lY+16);
    });
    out.toBlob(b => { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'mapa_vegetacao.png'; a.click(); }, 'image/png');
}

function exportPDF() {
    const s = 1.5, comp = renderComposite(s);
    const img = comp.toDataURL('image/jpeg', 0.90);
    const { jsPDF } = window.jspdf;
    const pw = comp.width*0.75, ph = comp.height*0.75, m = 40, hH = 50, lH = 40;
    const tw = pw + m*2;
    const doc = new jsPDF({ orientation: pw > ph ? 'landscape' : 'portrait', unit: 'pt', format: [tw, ph+hH+lH+m*2] });
    doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.setTextColor(34,34,34);
    doc.text('IMPLANTACAO DE VEGETACAO', tw/2, m+20, { align: 'center' });
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(119,119,119);
    doc.text('Plano de Paisagismo - Mapa de Especies Arboreas', tw/2, m+34, { align: 'center' });
    doc.setDrawColor(221,221,221); doc.line(m, m+hH-4, tw-m, m+hH-4);
    doc.addImage(img, 'JPEG', m, m+hH, pw, ph);
    const lY = m+hH+ph+8; doc.line(m, lY-4, tw-m, lY-4);
    const entries = Object.entries(treeData).filter(([,v]) => v.length > 0);
    const segW = pw / entries.length;
    entries.forEach(([code, pos], i) => {
        const cx = m + segW*i + segW/2, rgb = hexToRgb(speciesColors[code]);
        doc.setFillColor(rgb.r, rgb.g, rgb.b); doc.circle(cx-40, lY+8, 5, 'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(51,51,51);
        doc.text(`${code} (${pos.length} un.)`, cx-28, lY+11);
    });
    doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(160,160,160);
    doc.text('Gerado por Mapa de Vegetacao - Paisagismo Tecnico', tw/2, doc.internal.pageSize.getHeight()-10, { align: 'center' });
    doc.save('mapa_vegetacao.pdf');
}

function resetApp() {
    pdfFile = null; treeData = {}; speciesColors = {};
    fileInput.value = ''; fileNameEl.textContent = '';
    processBtn.disabled = true; mapSvg.innerHTML = ''; legendBar.innerHTML = '';
    speciesConfig.innerHTML = '';
    uploadSection.style.display = ''; previewSection.classList.remove('active');
    downloadSection.classList.remove('active'); statusText.textContent = '';
}
</script>
