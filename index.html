<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Mapa de Vegetacao</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #333;
            --text: #e0e0e0;
            --text2: #888;
            --accent: #4CAF50;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 { font-size: 16px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }

        .header .tag {
            font-size: 10px; color: var(--text2); background: var(--surface2);
            padding: 4px 10px; border-radius: 4px; letter-spacing: 1px;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 32px; }

        .upload-zone {
            border: 2px dashed var(--border); border-radius: 12px;
            padding: 60px 40px; text-align: center; cursor: pointer;
            transition: all 0.2s; background: var(--surface);
        }
        .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: rgba(76,175,80,0.05); }
        .upload-zone .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
        .upload-zone p { color: var(--text2); font-size: 14px; margin-top: 8px; }
        .upload-zone .filename { color: var(--accent); font-weight: 600; font-size: 14px; margin-top: 12px; }
        .upload-zone input { display: none; }

        .type-selector {
            display: flex; gap: 12px; margin-top: 24px; justify-content: center;
        }
        .type-option {
            display: flex; align-items: center; gap: 8px;
            background: var(--surface); border: 2px solid var(--border);
            padding: 12px 24px; border-radius: 10px; cursor: pointer;
            transition: all 0.15s; font-size: 14px;
        }
        .type-option:hover { border-color: var(--text2); }
        .type-option.selected { border-color: var(--accent); background: rgba(76,175,80,0.08); }
        .type-option input { display: none; }
        .type-icon { font-size: 20px; }

        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 28px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.15s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-outline:hover { border-color: var(--text2); background: var(--surface2); }

        .actions { display: flex; gap: 12px; margin-top: 24px; justify-content: center; }

        .species-config { display: flex; gap: 24px; margin-top: 24px; justify-content: center; flex-wrap: wrap; }
        .species-chip {
            display: flex; align-items: center; gap: 8px;
            background: var(--surface); border: 1px solid var(--border);
            padding: 8px 16px; border-radius: 20px; font-size: 13px;
        }
        .species-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .species-chip .code { font-weight: 700; }
        .species-chip .name { color: var(--text2); font-style: italic; }

        .progress-bar {
            width: 100%; height: 3px; background: var(--surface2);
            border-radius: 2px; margin-top: 24px; overflow: hidden; display: none;
        }
        .progress-bar.active { display: block; }
        .progress-bar .fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }

        .status { text-align: center; font-size: 13px; color: var(--text2); margin-top: 12px; min-height: 20px; }

        .preview-section { display: none; margin-top: 32px; }
        .preview-section.active { display: block; }

        .preview-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .preview-header {
            padding: 16px 24px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .preview-header h2 { font-size: 14px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        .preview-stats { display: flex; gap: 20px; }
        .preview-stats .stat { font-size: 12px; color: var(--text2); }
        .preview-stats .stat strong { color: var(--text); font-size: 18px; display: block; }

        .map-wrap { position: relative; background: white; }
        .map-wrap canvas { display: block; width: 100%; height: auto; }
        .map-wrap svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .legend-bar {
            display: flex; justify-content: center; gap: 40px;
            padding: 16px 24px; border-top: 1px solid var(--border); flex-wrap: wrap;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; }
        .legend-circle { width: 18px; height: 18px; border-radius: 50%; }
        .legend-square { width: 18px; height: 18px; border-radius: 3px; }
        .legend-label .lcode { font-weight: 700; font-size: 13px; }
        .legend-label .lname { font-style: italic; font-size: 12px; color: var(--text2); }
        .legend-label .lcount { font-size: 11px; color: var(--text2); }

        .download-section { display: none; margin-top: 24px; }
        .download-section.active { display: block; }
        .download-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .download-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
            padding: 20px; text-align: center; cursor: pointer; transition: all 0.15s;
        }
        .download-card:hover { border-color: var(--accent); background: var(--surface2); }
        .download-card .format { font-size: 22px; font-weight: 700; letter-spacing: 2px; margin-bottom: 6px; }
        .download-card .desc { font-size: 11px; color: var(--text2); }

        .new-upload { text-align: center; margin-top: 20px; }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .upload-zone { padding: 40px 20px; }
            .type-selector { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Mapa de Vegetacao</h1>
        <span class="tag">Paisagismo Tecnico</span>
    </div>
    <div class="container">
        <div id="uploadSection">
            <div class="upload-zone" id="dropZone">
                <div class="icon">&#128196;</div>
                <div><strong>Arraste o PDF de paisagismo aqui</strong></div>
                <p>ou clique para selecionar o arquivo</p>
                <div class="filename" id="fileName"></div>
                <input type="file" id="fileInput" accept=".pdf">
            </div>
            <div class="type-selector" id="typeSelector">
                <label class="type-option selected" data-type="arvore">
                    <input type="radio" name="plantType" value="arvore" checked>
                    <span class="type-icon">&#127794;</span>
                    <span>Arvores</span>
                </label>
                <label class="type-option" data-type="arbusto">
                    <input type="radio" name="plantType" value="arbusto">
                    <span class="type-icon">&#127807;</span>
                    <span>Arbustos</span>
                </label>
                <label class="type-option" data-type="forracao">
                    <input type="radio" name="plantType" value="forracao">
                    <span class="type-icon">&#127811;</span>
                    <span>Forracoes</span>
                </label>
            </div>
            <div class="species-config" id="speciesConfig"></div>
            <div class="actions"><button class="btn btn-primary" id="processBtn" disabled>Processar PDF</button></div>
            <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
            <div class="status" id="statusText"></div>
        </div>

        <div class="preview-section" id="previewSection">
            <div class="preview-card">
                <div class="preview-header">
                    <h2 id="previewTitle">Implantacao de Vegetacao</h2>
                    <div class="preview-stats">
                        <div class="stat"><strong id="totalItems">0</strong><span id="totalItemsLabel">itens</span></div>
                        <div class="stat"><strong id="totalSpecies">0</strong>especies</div>
                    </div>
                </div>
                <div class="map-wrap"><canvas id="mapCanvas"></canvas><svg id="mapSvg" xmlns="http://www.w3.org/2000/svg"></svg></div>
                <div class="legend-bar" id="legendBar"></div>
            </div>
        </div>

        <div class="download-section" id="downloadSection">
            <div class="download-grid">
                <div class="download-card" onclick="exportPNG()"><div class="format">PNG</div><div class="desc">Imagem em alta resolucao</div></div>
                <div class="download-card" onclick="exportPDF()"><div class="format">PDF</div><div class="desc">Documento para impressao</div></div>
            </div>
            <div class="new-upload"><button class="btn btn-outline" onclick="resetApp()">Processar outro PDF</button></div>
        </div>
    </div>

<script>
const COLOR_PALETTE = [
    '#E91E63', '#4CAF50', '#2196F3', '#FF9800', '#9C27B0',
    '#00BCD4', '#F44336', '#8BC34A', '#3F51B5', '#FFEB3B',
    '#795548', '#607D8B', '#FF5722', '#009688', '#673AB7',
    '#CDDC39', '#03A9F4', '#E040FB', '#76FF03', '#FF6D00',
];
const CIRCLE_OPACITY = 0.75;

const TYPE_CONFIG = {
    arvore: {
        label: 'Arvores', labelFull: 'Implantacao de Arvores',
        unit: 'arvores', radiusRatio: 0.0134,
    },
    arbusto: {
        label: 'Arbustos', labelFull: 'Implantacao de Arbustos',
        unit: 'arbustos', radiusRatio: 0.006,
    },
    forracao: {
        label: 'Forracoes', labelFull: 'Implantacao de Forracoes',
        unit: 'areas',
    },
};

let pdfFile = null, extractedData = null, currentType = 'arvore';
let pageW = 0, pageH = 0;

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const $ = id => document.getElementById(id);
const dropZone = $('dropZone'), fileInput = $('fileInput'), fileNameEl = $('fileName');
const processBtn = $('processBtn'), progressBar = $('progressBar'), progressFill = $('progressFill');
const statusText = $('statusText'), uploadSection = $('uploadSection');
const previewSection = $('previewSection'), downloadSection = $('downloadSection');
const mapCanvas = $('mapCanvas'), mapSvg = $('mapSvg'), legendBar = $('legendBar');
const speciesConfig = $('speciesConfig');

// Type selector
document.querySelectorAll('.type-option').forEach(opt => {
    opt.addEventListener('click', () => {
        document.querySelectorAll('.type-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        currentType = opt.dataset.type;
    });
});

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });
processBtn.addEventListener('click', processPDF);

function handleFile(f) {
    if (f.type !== 'application/pdf') { statusText.textContent = 'Selecione um arquivo PDF.'; return; }
    pdfFile = f; fileNameEl.textContent = f.name; processBtn.disabled = false; statusText.textContent = '';
}

function setProgress(p) { progressBar.classList.add('active'); progressFill.style.width = p + '%'; }

function createChip(color, label, count, isSquare) {
    const chip = document.createElement('div');
    chip.className = 'species-chip';
    const dot = document.createElement('span');
    dot.className = 'species-dot';
    dot.style.background = color;
    if (isSquare) dot.style.borderRadius = '3px';
    const codeSpan = document.createElement('span');
    codeSpan.className = 'code';
    codeSpan.textContent = label;
    const nameSpan = document.createElement('span');
    nameSpan.className = 'name';
    nameSpan.textContent = '(' + count + ')';
    chip.appendChild(dot);
    chip.appendChild(codeSpan);
    chip.appendChild(nameSpan);
    return chip;
}

function createLegendItem(color, code, name, count, unit, isSquare) {
    const el = document.createElement('div');
    el.className = 'legend-item';
    const symbol = document.createElement('span');
    symbol.className = isSquare ? 'legend-square' : 'legend-circle';
    symbol.style.background = color;
    const labelDiv = document.createElement('div');
    labelDiv.className = 'legend-label';
    const codeSpan = document.createElement('span');
    codeSpan.className = 'lcode';
    codeSpan.textContent = code;
    labelDiv.appendChild(codeSpan);
    if (name) {
        const nameSpan = document.createElement('span');
        nameSpan.className = 'lname';
        nameSpan.textContent = ' ' + name;
        labelDiv.appendChild(nameSpan);
    }
    const countSpan = document.createElement('span');
    countSpan.className = 'lcount';
    countSpan.textContent = ' (' + count + ' ' + unit + ')';
    labelDiv.appendChild(countSpan);
    el.appendChild(symbol);
    el.appendChild(labelDiv);
    return el;
}

async function processPDF() {
    if (!pdfFile) return;
    processBtn.disabled = true;
    setProgress(10); statusText.textContent = 'Enviando PDF para processamento...';

    const config = TYPE_CONFIG[currentType];

    try {
        // Send PDF to API
        const formData = new FormData();
        formData.append('file', pdfFile);
        formData.append('type', currentType);

        setProgress(20);
        const response = await fetch('/api/extract', {
            method: 'POST',
            body: formData,
        });

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || 'Server error: ' + response.status);
        }

        setProgress(50); statusText.textContent = 'Dados extraidos. Renderizando mapa...';
        extractedData = await response.json();
        pageW = extractedData.pageWidth;
        pageH = extractedData.pageHeight;

        // Render PDF background with PDF.js
        setProgress(60); statusText.textContent = 'Renderizando planta base...';
        const buf = await pdfFile.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        const page = await pdf.getPage(1);
        const vp = page.getViewport({ scale: 1.0 });

        const ctx = mapCanvas.getContext('2d');
        mapCanvas.width = vp.width; mapCanvas.height = vp.height;
        await page.render({ canvasContext: ctx, viewport: vp }).promise;

        // Grayscale + 20% opacity
        const imgData = ctx.getImageData(0, 0, mapCanvas.width, mapCanvas.height);
        const d = imgData.data;
        for (let i = 0; i < d.length; i += 4) {
            const g = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
            d[i] = d[i+1] = d[i+2] = Math.round(255 * 0.8 + g * 0.2);
        }
        ctx.putImageData(imgData, 0, 0);

        setProgress(80); statusText.textContent = 'Desenhando vegetacao...';

        // Draw SVG overlay
        mapSvg.setAttribute('viewBox', '0 0 ' + pageW + ' ' + pageH);
        mapSvg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        while (mapSvg.firstChild) mapSvg.removeChild(mapSvg.firstChild);

        let totalItems = 0, totalSpeciesCount = 0;

        if (currentType === 'forracao') {
            const areas = extractedData.areas;
            for (const label of Object.keys(areas)) {
                const areaInfo = areas[label];
                totalSpeciesCount++;
                for (const path of areaInfo.paths) {
                    totalItems++;
                    if (path.length < 2) continue;
                    const dAttr = 'M ' + path.map(function(p) { return p[0] + ',' + p[1]; }).join(' L ') + ' Z';
                    const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    el.setAttribute('d', dAttr);
                    el.setAttribute('fill', areaInfo.color);
                    el.setAttribute('fill-opacity', '0.6');
                    el.setAttribute('stroke', areaInfo.color);
                    el.setAttribute('stroke-width', '0.5');
                    el.setAttribute('stroke-opacity', '0.3');
                    mapSvg.appendChild(el);
                }
            }
        } else {
            const species = extractedData.species;
            const r = pageW * config.radiusRatio;
            const dashArray = currentType === 'arbusto' ? '4,2' : '';
            for (const code of Object.keys(species)) {
                const info = species[code];
                totalSpeciesCount++;
                for (const p of info.positions) {
                    totalItems++;
                    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    c.setAttribute('cx', p.x); c.setAttribute('cy', p.y); c.setAttribute('r', r);
                    c.setAttribute('fill', info.color); c.setAttribute('fill-opacity', String(CIRCLE_OPACITY));
                    c.setAttribute('stroke', 'white'); c.setAttribute('stroke-width', '2.5');
                    if (dashArray) c.setAttribute('stroke-dasharray', dashArray);
                    mapSvg.appendChild(c);
                }
            }
        }

        // Show chips
        while (speciesConfig.firstChild) speciesConfig.removeChild(speciesConfig.firstChild);
        if (currentType === 'forracao') {
            for (const label of Object.keys(extractedData.areas)) {
                const info = extractedData.areas[label];
                speciesConfig.appendChild(createChip(info.color, label, info.paths.length, true));
            }
        } else {
            for (const code of Object.keys(extractedData.species)) {
                const info = extractedData.species[code];
                speciesConfig.appendChild(createChip(info.color, code, info.positions.length, false));
            }
        }

        // Legend
        while (legendBar.firstChild) legendBar.removeChild(legendBar.firstChild);
        if (currentType === 'forracao') {
            for (const label of Object.keys(extractedData.areas)) {
                const info = extractedData.areas[label];
                legendBar.appendChild(createLegendItem(info.color, label, '', info.paths.length, 'areas', true));
            }
        } else {
            for (const code of Object.keys(extractedData.species)) {
                const info = extractedData.species[code];
                legendBar.appendChild(createLegendItem(info.color, code, info.name || '', info.positions.length, 'un.', false));
            }
        }

        // Stats
        $('previewTitle').textContent = config.labelFull;
        $('totalItems').textContent = totalItems;
        $('totalItemsLabel').textContent = config.unit;
        $('totalSpecies').textContent = totalSpeciesCount;

        setProgress(100); statusText.textContent = '';
        setTimeout(function() {
            uploadSection.style.display = 'none';
            previewSection.classList.add('active');
            downloadSection.classList.add('active');
            progressBar.classList.remove('active');
        }, 300);
    } catch (err) {
        console.error(err);
        statusText.textContent = 'Erro: ' + err.message;
        processBtn.disabled = false; setProgress(0); progressBar.classList.remove('active');
    }
}

function hexToRgb(h) { h = h.replace('#',''); return { r: parseInt(h.substring(0,2),16), g: parseInt(h.substring(2,4),16), b: parseInt(h.substring(4,6),16) }; }

function renderComposite(scale) {
    var w = pageW * scale, h = pageH * scale;
    var c = document.createElement('canvas'); c.width = w; c.height = h;
    var ctx = c.getContext('2d');
    ctx.drawImage(mapCanvas, 0, 0, w, h);

    var config = TYPE_CONFIG[currentType];

    if (currentType === 'forracao') {
        for (var label of Object.keys(extractedData.areas)) {
            var info = extractedData.areas[label];
            var rgb = hexToRgb(info.color);
            ctx.fillStyle = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',0.6)';
            for (var path of info.paths) {
                if (path.length < 3) continue;
                ctx.beginPath();
                ctx.moveTo(path[0][0] * scale, path[0][1] * scale);
                for (var i = 1; i < path.length; i++) {
                    ctx.lineTo(path[i][0] * scale, path[i][1] * scale);
                }
                ctx.closePath();
                ctx.fill();
            }
        }
    } else {
        var r = pageW * config.radiusRatio * scale;
        for (var code of Object.keys(extractedData.species)) {
            var info = extractedData.species[code];
            var rgb = hexToRgb(info.color);
            ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2.5 * scale;
            for (var p of info.positions) {
                ctx.beginPath(); ctx.arc(p.x * scale, p.y * scale, r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + CIRCLE_OPACITY + ')'; ctx.fill(); ctx.stroke();
            }
        }
    }
    return c;
}

function getExportEntries() {
    if (currentType === 'forracao') {
        return Object.keys(extractedData.areas).map(function(label) {
            var info = extractedData.areas[label];
            return { key: label, color: info.color, count: info.paths.length, unit: 'areas', name: '' };
        });
    }
    return Object.keys(extractedData.species).map(function(code) {
        var info = extractedData.species[code];
        return { key: code, color: info.color, count: info.positions.length, unit: 'un.', name: info.name || '' };
    });
}

function exportPNG() {
    var config = TYPE_CONFIG[currentType];
    var s = 2, mc = renderComposite(s);
    var hH = 80, lH = 50, tH = hH + mc.height + lH;
    var out = document.createElement('canvas'); out.width = mc.width; out.height = tH;
    var ctx = out.getContext('2d');
    ctx.fillStyle = 'white'; ctx.fillRect(0, 0, out.width, tH);
    ctx.fillStyle = '#222'; ctx.font = 'bold ' + (24*s) + 'px Helvetica,Arial,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('IMPLANTACAO DE VEGETACAO', out.width/2, 30*s);
    ctx.fillStyle = '#777'; ctx.font = (11*s) + 'px Helvetica,Arial,sans-serif';
    ctx.fillText('Plano de Paisagismo - ' + config.labelFull, out.width/2, 48*s);
    ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(40*s, hH-2); ctx.lineTo(out.width-40*s, hH-2); ctx.stroke();
    ctx.drawImage(mc, 0, hH);
    var lY = hH + mc.height + 8;
    ctx.beginPath(); ctx.moveTo(40*s, lY-6); ctx.lineTo(out.width-40*s, lY-6); ctx.stroke();

    var entries = getExportEntries().filter(function(e) { return e.count > 0; });
    var segW = out.width / Math.max(entries.length, 1);
    entries.forEach(function(entry, i) {
        var cx = segW*i + segW/2;
        if (currentType === 'forracao') {
            ctx.fillStyle = entry.color;
            ctx.fillRect(cx-58*s, lY+4, 16*s, 16*s);
        } else {
            ctx.beginPath(); ctx.arc(cx-50*s, lY+12, 8*s, 0, Math.PI*2);
            ctx.fillStyle = entry.color; ctx.fill();
        }
        ctx.fillStyle = '#333'; ctx.font = 'bold ' + (10*s) + 'px Helvetica,Arial,sans-serif'; ctx.textAlign = 'left';
        var labelText = entry.name ? entry.key + '  ' + entry.name : entry.key;
        ctx.fillText(labelText + ' (' + entry.count + ' ' + entry.unit + ')', cx-36*s, lY+16);
    });
    var suffix = currentType === 'forracao' ? 'forracoes' : (currentType === 'arbusto' ? 'arbustos' : 'arvores');
    out.toBlob(function(b) { var a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'mapa_' + suffix + '.png'; a.click(); }, 'image/png');
}

function exportPDF() {
    var config = TYPE_CONFIG[currentType];
    var s = 1.5, comp = renderComposite(s);
    var img = comp.toDataURL('image/jpeg', 0.90);
    var jsPDFLib = window.jspdf;
    var pw = comp.width*0.75, ph = comp.height*0.75, m = 40, hH = 50, lH = 40;
    var tw = pw + m*2;
    var doc = new jsPDFLib.jsPDF({ orientation: pw > ph ? 'landscape' : 'portrait', unit: 'pt', format: [tw, ph+hH+lH+m*2] });
    doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.setTextColor(34,34,34);
    doc.text('IMPLANTACAO DE VEGETACAO', tw/2, m+20, { align: 'center' });
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(119,119,119);
    doc.text('Plano de Paisagismo - ' + config.labelFull, tw/2, m+34, { align: 'center' });
    doc.setDrawColor(221,221,221); doc.line(m, m+hH-4, tw-m, m+hH-4);
    doc.addImage(img, 'JPEG', m, m+hH, pw, ph);
    var lY = m+hH+ph+8; doc.line(m, lY-4, tw-m, lY-4);

    var entries = getExportEntries().filter(function(e) { return e.count > 0; });
    var segW = pw / Math.max(entries.length, 1);
    entries.forEach(function(entry, i) {
        var cx = m + segW*i + segW/2, rgb = hexToRgb(entry.color);
        doc.setFillColor(rgb.r, rgb.g, rgb.b);
        if (currentType === 'forracao') {
            doc.rect(cx-44, lY+3, 10, 10, 'F');
        } else {
            doc.circle(cx-40, lY+8, 5, 'F');
        }
        doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(51,51,51);
        var labelText = entry.name ? entry.key + '  ' + entry.name : entry.key;
        doc.text(labelText + ' (' + entry.count + ' ' + entry.unit + ')', cx-28, lY+11);
    });
    doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(160,160,160);
    doc.text('Gerado por Mapa de Vegetacao - Paisagismo Tecnico', tw/2, doc.internal.pageSize.getHeight()-10, { align: 'center' });
    var suffix = currentType === 'forracao' ? 'forracoes' : (currentType === 'arbusto' ? 'arbustos' : 'arvores');
    doc.save('mapa_' + suffix + '.pdf');
}

function resetApp() {
    pdfFile = null; extractedData = null;
    fileInput.value = ''; fileNameEl.textContent = '';
    processBtn.disabled = true;
    while (mapSvg.firstChild) mapSvg.removeChild(mapSvg.firstChild);
    while (legendBar.firstChild) legendBar.removeChild(legendBar.firstChild);
    while (speciesConfig.firstChild) speciesConfig.removeChild(speciesConfig.firstChild);
    uploadSection.style.display = ''; previewSection.classList.remove('active');
    downloadSection.classList.remove('active'); statusText.textContent = '';
}
</script>
